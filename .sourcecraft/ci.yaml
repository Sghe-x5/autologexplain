on:
  pull_request:
    - workflows: test-backend-workflow
      filter:
        paths: ["backend/**", "testing/**"]
    - workflows: test-analytics-workflow
      filter:
        paths: "analytics/**"
    - workflows: test-frontend-workflow
      filter:
        paths: "frontend/**"
  push:
    - workflows: ["test-backend-workflow", "build-backend-workflow"]
      filter:
        paths: ["backend/**", "testing/**"]
        branches: "main"
    - workflows: ["test-analytics-workflow", "build-analytics-workflow"]
      filter:
        paths: "analytics/**"
        branches: "main"

workflows:
  test-backend-workflow:
    tasks:
      - backend-linters
      - backend-tests
  test-frontend-workflow:
    tasks:
      - frontend-linters
      - frontend-tests
  test-analytics-workflow:
    tasks:
      - analytics-linters
      - analytics-tests
  build-backend-workflow:
    tasks:
      - backend-build-push
  build-analytics-workflow:
    tasks:
      - analytics-build-push

tasks:
  - name: analytics-build-push
    env:
      YC_DOCKER_REGISTRY_URI: cr.yandex/crp9a5kr08o67cpmqtkl
      IMAGE_NAME: analytics
      YC_SERVICE_ACCOUNT_ID: ajed0e5oqj975k8up4vp
      YC_AUTHORIZED_KEY_JSON: ${{ secrets.service_key }}
      YC_FOLDER_ID: b1g3u90stuffbcgnkgne
    cubes:
      - name: install-yc
        script:
          - curl -o ./yc-install.sh -L https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          - echo 'source /root/yandex-cloud/completion.zsh.inc' >>  ~/.zshrc
          - chmod +x ./yc-install.sh && ./yc-install.sh -i /tmp/yc -n && mv /tmp/yc/bin/yc /usr/bin/yc
          - echo "$YC_AUTHORIZED_KEY_JSON" > key.json
          - yc config profile create sa-profile
          - yc config set service-account-key key.json
          - yc config set format json
          - yc config set folder-id $YC_FOLDER_ID
      - name: docker-login
        script:
          - yc container registry configure-docker --profile sa-profile
      - name: docker-build-push
        script:
          - cd $SOURCECRAFT_WORKSPACE/analytics
          - docker build --tag $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME --platform linux/amd64 .
          - docker push $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME:latest
      - name: docker-logout
        script:
          - docker logout $YC_DOCKER_REGISTRY_URI

  - name: backend-build-push
    env:
      YC_DOCKER_REGISTRY_URI: cr.yandex/crp9a5kr08o67cpmqtkl
      IMAGE_NAME: backend
      YC_SERVICE_ACCOUNT_ID: ajed0e5oqj975k8up4vp
      YC_AUTHORIZED_KEY_JSON: ${{ secrets.service_key }}
      YC_FOLDER_ID: b1g3u90stuffbcgnkgne
    cubes:
      - name: install-yc
        script:
          - curl -o ./yc-install.sh -L https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          - echo 'source /root/yandex-cloud/completion.zsh.inc' >>  ~/.zshrc
          - chmod +x ./yc-install.sh && ./yc-install.sh -i /tmp/yc -n && mv /tmp/yc/bin/yc /usr/bin/yc
          - echo "$YC_AUTHORIZED_KEY_JSON" > key.json
          - yc config profile create sa-profile
          - yc config set service-account-key key.json
          - yc config set format json
          - yc config set folder-id $YC_FOLDER_ID
      - name: docker-login
        script:
          - yc container registry configure-docker --profile sa-profile
      - name: docker-build-push
        script:
          - cd $SOURCECRAFT_WORKSPACE/backend
          - docker build --tag $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME --platform linux/amd64 .
          - docker push $YC_DOCKER_REGISTRY_URI/$IMAGE_NAME:latest
      - name: docker-logout
        script:
          - docker logout $YC_DOCKER_REGISTRY_URI

  - name: backend-linters
    cubes:
      - name: backend-linting
        image: python:3.11
        script:
          - pip install poetry==1.8.3
          - poetry config virtualenvs.create false
          - cd backend
          - poetry install --no-interaction --no-ansi --no-root
          - poetry run pip install ruff mypy
          - poetry run ruff check .
          - poetry run ruff format --diff .
          - poetry run mypy .

  - name: backend-tests
    env:
      CLICKHOUSE_HOST: ${{ secrets.clickhouse_host }}
      CLICKHOUSE_PASSWORD: ${{ secrets.clickhouse_password }}
      WS_TOKEN: ${{ secrets.ws_token }}
    cubes:
      - name: backend-tests
        image: python:3.11
        script:
          - pip install poetry==1.8.3
          - poetry config virtualenvs.create false
          - cd backend
          - poetry install --no-interaction --no-ansi
          - poetry run pytest
      - name: run-environment
        script:
          - cd $SOURCECRAFT_WORKSPACE/backend
          - cp .env.example .env
          - sed -i "s/your-clickhouse-host-here/$CLICKHOUSE_HOST/g" .env
          - sed -i "s/your-password-here/$CLICKHOUSE_PASSWORD/g" .env
          - sed -i "s/your-token-here/$WS_TOKEN/g" .env
          - docker-compose up -d --build
      - name: run-api-tests
        script:
          - cd $SOURCECRAFT_WORKSPACE/testing/api_tests
          - python -m venv .venv
          - source .venv/bin/activate
          - pip install -r requirements.txt
          - cp .env.example .env
          - sed -i 's/api_base_url/http:\/\/localhost:8080\//g' .env
          - pytest --alluredir=allure-results
          
          - apt-get install -y openjdk-11-jre-headless wget zip

          - wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          - tar -zxvf allure-2.34.1.tgz
          
          - ./allure-2.34.1/bin/allure generate allure-results --clean -o allure-report
          - zip -r allure-report.zip allure-report
          - zip -r allure-results.zip allure-results
        artifacts:
          paths:
            - testing/api_tests/allure-report.zip
            - testing/api_tests/allure-results.zip

  - name: analytics-linters
    cubes:
      - name: analytics-linting
        image: python:3.11
        script:
          - pip install poetry==1.8.3
          - poetry config virtualenvs.create false
          - cd analytics
          - poetry install --no-interaction --no-ansi --no-root
          - poetry run pip install ruff mypy
          - poetry run ruff check .
          - poetry run ruff format --diff .
          - poetry run mypy .
  - name: analytics-tests
    cubes:
      - name: analytics-tests
        image: python:3.11
        script:
          - pip install poetry==1.8.3
          - poetry config virtualenvs.create false
          - cd analytics
          - poetry install --no-interaction --no-ansi
          - poetry run pytest
  - name: frontend-linters
    cubes:
      - name: frontend-linting
        image: node:20
        script:
          - cd frontend
          - yarn install --frozen-lockfile
          - yarn lint
  - name: frontend-tests
    cubes:
      - name: frontend-tests
        image: node:20
        script:
          - cd frontend
          - yarn install --frozen-lockfile
          - yarn test