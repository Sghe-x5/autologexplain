on:
  pull_request:
    - workflows: test-backend-workflow
      filter:
        paths: "backend/**"
        target_branches:
          - "main"
          - "dev"

    - workflows: test-frontend-workflow
      filter:
        paths: "frontend/**"
        target_branches:
          - "main"
          - "dev"

workflows:
  test-backend-workflow:
    tasks:
      - test-backend-linters
  test-frontend-workflow:
    tasks:
      - test-frontend-linters

tasks:
  - name: test-backend-linters
    cubes:
      - name: backend-linting
        image: python:3.11
        script:
          - pip install poetry==1.8.3
          - poetry config virtualenvs.create false
          - cd backend
          - poetry install --no-interaction --no-ansi --no-root
          - poetry run pip install ruff mypy
          - poetry run ruff check .
          - poetry run ruff format --diff .
          - poetry run mypy .

  - name: test-frontend-linters
    cubes:
      - name: frontend-linting
        image: node:20
        script:
          - cd frontend
          - yarn install --frozen-lockfile
          - yarn lint
