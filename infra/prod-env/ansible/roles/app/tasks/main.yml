---
# Установка Docker CE из официального репозитория + compose v2
- name: Install prerequisites for Docker repo
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Ensure /etc/apt/keyrings exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Remove Ubuntu docker.io to avoid conflicts (if present)
  apt:
    name: docker.io
    state: absent
    purge: yes
  ignore_errors: true

- name: Add Docker apt repository
  apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture in ['x86_64','amd64']
      else ('arm64' if ansible_architecture in ['aarch64','arm64'] else ansible_architecture) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release | default('noble') }} stable
    filename: docker
    state: present

- name: Install Docker CE and plugins
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Load overlay kernel module (best-effort)
  command: modprobe overlay
  register: overlay_mod
  ignore_errors: true
  changed_when: false

- name: Load br_netfilter kernel module (best-effort)
  command: modprobe br_netfilter
  register: brnf_mod
  ignore_errors: true
  changed_when: false

- name: Ensure netfilter sysctl for bridged traffic
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables',  value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward',                 value: '1' }
  ignore_errors: true

- name: Ensure /etc/docker exists
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Render /etc/docker/daemon.json
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker

- name: Add user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Wait for docker socket
  wait_for:
    path: /var/run/docker.sock
    timeout: 30

- name: Docker login (optional)
  command: >-
    bash -lc "echo '{{ docker_registry_password }}' | docker login {{ docker_registry | default('') }} -u '{{ docker_registry_username }}' --password-stdin"
  when:
    - docker_registry_username is defined
    - docker_registry_password is defined
    - docker_registry_username | length > 0
    - docker_registry_password | length > 0
  changed_when: true

- name: Ensure /opt/app exists
  file:
    path: /opt/app
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

# Ensure nginx config dir early (needed for optional htpasswd before compose up)
- name: Ensure nginx config dir exists
  ansible.builtin.file:
    path: /opt/app/nginx
    state: directory
    mode: '0755'

# Локальная сборка backend (опционально)
- name: Ensure backend build context root exists
  file:
    path: /opt/app/src
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  when: backend_build_local | default(false)

- name: Sync backend sources to target (may take time)
  copy:
    src: "{{ playbook_dir }}/../../../backend/"
    dest: "/opt/app/src/backend/"
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  when: backend_build_local | default(false)

# Determine if basic auth is enabled based on provided vars/env
- name: Set basic auth enabled fact
  ansible.builtin.set_fact:
    nginx_basic_auth_enabled: >-
      {{
        (nginx_basic_auth_user | default(lookup('env','NGINX_BASIC_AUTH_USER')) | default('', true)) | length > 0 and
        (nginx_basic_auth_password | default(lookup('env','NGINX_BASIC_AUTH_PASSWORD')) | default('', true)) | length > 0
      }}

- name: Check if .htpasswd path is a directory
  ansible.builtin.stat:
    path: /opt/app/nginx/.htpasswd
  register: htpasswd_stat

- name: Remove .htpasswd directory if exists
  ansible.builtin.file:
    path: /opt/app/nginx/.htpasswd
    state: absent
  when: htpasswd_stat.stat.exists and htpasswd_stat.stat.isdir | default(false)

- name: Ensure OpenSSL is present for htpasswd hashing
  ansible.builtin.package:
    name: openssl
    state: present

- name: Create Basic Auth credentials file
  vars:
    _ht_user: "{{ nginx_basic_auth_user | default(lookup('env','NGINX_BASIC_AUTH_USER')) }}"
    _ht_pass: "{{ nginx_basic_auth_password | default(lookup('env','NGINX_BASIC_AUTH_PASSWORD')) }}"
  when:
    - nginx_basic_auth_enabled | default(false)
  block:
    - name: Hash password with apr1
      ansible.builtin.command: "openssl passwd -apr1 {{ _ht_pass | quote }}"
      register: _ht_hash
      changed_when: false
      no_log: true

    - name: Write .htpasswd file
      ansible.builtin.copy:
        dest: /opt/app/nginx/.htpasswd
        content: "{{ _ht_user }}:{{ _ht_hash.stdout }}\n"
        owner: root
        group: root
        mode: '0640'
      no_log: true
      notify: Restart app stack

# Шаблоны конфигов (render after htpasswd decision)
- name: Render nginx.conf
  template:
    src: nginx.conf.j2
    dest: /opt/app/nginx.conf
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  notify: Restart app stack

- name: Render backend.env
  template:
    src: backend.env.j2
    dest: /opt/app/backend.env
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  notify: Restart app stack

- name: Render analytics.env
  template:
    src: analytics.env.j2
    dest: /opt/app/analytics.env
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  notify: Restart app stack

- name: Render docker compose
  template:
    src: compose.yaml.j2
    dest: /opt/app/compose.yaml
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  notify: Restart app stack

# Запуск контейнеров (Compose v2)
- name: Pull and start containers
  command: docker compose -f /opt/app/compose.yaml up -d --pull always
  args:
    chdir: /opt/app
  become: true
