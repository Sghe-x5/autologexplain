services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - ./.env
      - ../analytics/.env
    environment:
      - PYTHONPATH=/app:/app/backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: >
      celery -A backend.celery_worker.celery_app worker
      -l info
      --concurrency=2
      -E
    env_file:
      - ./.env
      - ../analytics/.env
    environment:
      - PYTHONPATH=/app:/app/backend      # << добавили backend в PYTHONPATH
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
