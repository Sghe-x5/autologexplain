services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app:/app/backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ..:/app
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: >
      celery -A backend.celery_worker.celery_app worker
      -l info
      --concurrency=2
      -E
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app:/app/backend
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ..:/app
    restart: unless-stopped

  beat:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: >
      celery -A backend.celery_worker.celery_app beat
      -l info
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app:/app/backend
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ..:/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped
