services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    env_file: [.env]
    ports: ["8080:8080"]
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A celery_worker.celery_app worker --loglevel=INFO --concurrency=2 -E
    env_file: [.env]
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: mypass
    ports: ["8123:8123"]
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  ch_data:
