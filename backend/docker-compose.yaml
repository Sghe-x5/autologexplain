services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    env_file: [.env]
    ports: ["8080:8080"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  worker:
    build: .
    command: celery -A celery_worker.celery_app worker --loglevel=INFO --concurrency=2 -E
    env_file: [.env]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]  # можно убрать наружу, если не нужен доступ с хоста
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
